<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="/bridge.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,sans-serif;background:transparent}
  form{display:flex;align-items:center;height:100%;padding:8px 10px;box-sizing:border-box;gap:8px}
  .box{flex:1;display:flex;align-items:center;gap:9px;background:#1e293b;border:1px solid #334155;border-radius:99px;padding:0 16px;height:100%;max-height:44px}
  .box:focus-within{border-color:#38bdf8}
  input{flex:1;background:none;border:0;outline:none;color:#e2e8f0;font-size:14px}
  .g{opacity:.55;font-size:14px}
</style>
</head>
<body>
<form id="form">
  <div class="box"><span class="g">🔍</span><input id="q" autofocus></div>
</form>
<script>
const ENGINES = {
  google: 'https://www.google.com/search?q=',
  duckduckgo: 'https://duckduckgo.com/?q=',
  bing: 'https://www.bing.com/search?q='
};
const T = { en: 'Search the web…', es: 'Busca en la web…' };
(async () => {
  const ctx = await focus.init();
  const q = document.getElementById('q');
  q.placeholder = T[ctx.locale] || T.en;
  const base = ENGINES[(ctx.settings.engine || 'google').toLowerCase()] || ENGINES.google;
  document.getElementById('form').onsubmit = (e) => {
    e.preventDefault();
    if (!q.value.trim()) return;
    const url = base + encodeURIComponent(q.value.trim());
    try { window.top.location.href = url; }
    catch { window.open(url, '_blank'); }
  };
})();
</script>
</body>
</html>
