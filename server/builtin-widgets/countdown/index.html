<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="/bridge.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;background:transparent}
  .wrap{position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;gap:2px}
  .n{font-size:clamp(28px,20vw,48px);font-weight:800;color:#fbbf24}
  .l{font-size:12px;opacity:.75;text-align:center;padding:0 10px}
  .sample{position:absolute;top:6px;right:8px;font-size:9px;background:#334155;border-radius:6px;padding:2px 6px;opacity:.8}
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>
<script>
const T = {
  en: { days: 'days until', today: "It's today! 🎉", past: 'already happened', sample: 'sample data', dflt: 'the big day' },
  es: { days: 'días para', today: '¡Es hoy! 🎉', past: 'ya pasó', sample: 'datos de ejemplo', dflt: 'el gran día' }
};
(async () => {
  const ctx = await focus.init();
  const t = T[ctx.locale] || T.en;
  const wrap = document.getElementById('wrap');
  if (!ctx.settings.date) {
    wrap.innerHTML = `<div class="sample">${t.sample}</div><div class="n">${ctx.sampleData.days}</div><div class="l">${t.days} ${ctx.sampleData.title}</div>`;
    focus.requestSetup();
    return;
  }
  const target = new Date(ctx.settings.date + 'T00:00:00');
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const days = Math.round((target - today) / 86400000);
  const title = ctx.settings.title || t.dflt;
  if (days === 0) wrap.innerHTML = `<div class="n">🎉</div><div class="l">${title}: ${t.today}</div>`;
  else if (days < 0) wrap.innerHTML = `<div class="n">${-days}</div><div class="l">${title} ${t.past}</div>`;
  else wrap.innerHTML = `<div class="n">${days}</div><div class="l">${t.days} ${title}</div>`;
})();
</script>
</body>
</html>
